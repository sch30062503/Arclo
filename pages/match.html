<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Match — Arclo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .match-wrap { max-width: 680px; margin: 48px auto; padding: 0 24px 48px; }
    .state-card { background: var(--slate); border: 0.5px solid var(--slate-light); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 14px; }
    .state-card-title { font-size: 0.75rem; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
    /* Fixture header */
    .fixture-header { margin-bottom: 28px; }
    .fixture-vs { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .fixture-player { flex: 1; }
    .fixture-player-name { font-size: 1.1rem; font-weight: 600; color: #fff; }
    .fixture-player-stats { font-size: 0.75rem; color: var(--gray); margin-top: 3px; }
    .fixture-vs-label { font-size: 1rem; color: var(--gray-dim); font-weight: 600; flex-shrink: 0; }
    .fixture-meta { display: flex; flex-direction: column; gap: 6px; }
    .fixture-meta-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; padding: 6px 0; border-bottom: 0.5px solid var(--slate-light); }
    .fixture-meta-row:last-child { border-bottom: none; }
    .fixture-meta-label { color: var(--gray); }
    .fixture-meta-val { color: #fff; font-weight: 500; }
    .agreed-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(74,222,128,0.12); border: 0.5px solid rgba(74,222,128,0.3); border-radius: 999px; padding: 3px 10px; font-size: 0.8rem; color: #4ade80; font-weight: 500; }
    /* Availability */
    .avail-slot { display: flex; align-items: center; justify-content: space-between; background: var(--midnight); border: 0.5px solid var(--slate-light); border-radius: var(--radius); padding: 8px 12px; font-size: 0.8rem; color: var(--gray); margin-bottom: 6px; }
    .avail-slot-remove { background: none; border: none; color: #f87171; cursor: pointer; font-size: 1rem; padding: 0 2px; }
    /* Calendar */
    .cal-wrap { background: var(--midnight); border: 0.5px solid var(--slate-light); border-radius: var(--radius-lg); padding: 14px; margin-bottom: 12px; }
    .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .cal-month-label { font-size: 0.9rem; font-weight: 600; color: #fff; }
    .cal-nav { background: none; border: 0.5px solid var(--slate-light); border-radius: var(--radius); color: var(--gray); cursor: pointer; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
    .cal-nav:hover { color: #fff; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; margin-bottom: 10px; }
    .cal-dl { font-size: 0.6rem; color: var(--gray); text-align: center; padding: 3px 0; font-weight: 600; }
    .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 0.78rem; color: var(--gray); cursor: pointer; border: 0.5px solid transparent; transition: all 0.1s; }
    .cal-day:hover { background: var(--slate); color: #fff; }
    .cal-day.today { border-color: rgba(232,255,71,0.4); color: var(--volt); }
    .cal-day.selected { background: var(--volt); color: var(--midnight); font-weight: 600; }
    .cal-day.empty, .cal-day.past { opacity: 0.18; cursor: default; pointer-events: none; }
    .sel-date { font-size: 0.8rem; color: var(--volt); margin-bottom: 10px; min-height: 18px; }
    .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .time-label { font-size: 0.72rem; color: var(--gray); margin-bottom: 4px; }
    .time-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .t-sel { background: var(--midnight); border: 0.5px solid var(--slate-light); border-radius: var(--radius); padding: 7px 8px; font-size: 0.82rem; color: #fff; outline: none; font-family: var(--font); cursor: pointer; width: 100%; }
    /* Overlap slots */
    .overlap-day { margin-bottom: 12px; }
    .overlap-day-name { font-size: 0.8rem; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .slot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(88px,1fr)); gap: 6px; }
    .slot-btn { background: var(--midnight); border: 0.5px solid var(--slate-light); border-radius: var(--radius); padding: 8px 4px; text-align: center; font-size: 0.78rem; color: var(--gray); cursor: pointer; transition: all 0.12s; font-family: var(--font); }
    .slot-btn:hover { background: rgba(55,138,221,0.15); border-color: rgba(55,138,221,0.4); color: #fff; }
    /* Chat */
    .chat-msgs { max-height: 260px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; padding: 2px; }
    .chat-msgs::-webkit-scrollbar { width: 3px; }
    .chat-msgs::-webkit-scrollbar-thumb { background: var(--slate-light); border-radius: 2px; }
    .msg-row { display: flex; flex-direction: column; gap: 2px; }
    .msg-row.mine { align-items: flex-end; }
    .msg-row.theirs { align-items: flex-start; }
    .msg-bubble { max-width: 80%; padding: 7px 11px; border-radius: 10px; font-size: 0.82rem; line-height: 1.5; }
    .msg-bubble.mine { background: rgba(232,255,71,0.12); color: #fff; border-bottom-right-radius: 3px; }
    .msg-bubble.theirs { background: var(--midnight); color: #fff; border-bottom-left-radius: 3px; }
    .msg-bubble.proposal { background: rgba(55,138,221,0.12); border: 0.5px solid rgba(55,138,221,0.3); color: #fff; }
    .msg-bubble.sys { background: transparent; color: var(--gray); font-size: 0.75rem; font-style: italic; text-align: center; max-width: 100%; }
    .msg-sender { font-size: 0.68rem; color: var(--gray); padding: 0 3px; }
    .proposal-label { font-size: 0.68rem; font-weight: 600; color: #378ADD; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
    .proposal-actions { display: flex; gap: 6px; margin-top: 8px; }
    .btn-accept { background: #4ade80; color: #0d0d0f; border: none; border-radius: var(--radius); padding: 5px 12px; font-size: 0.78rem; font-weight: 600; cursor: pointer; font-family: var(--font); }
    .btn-counter { background: transparent; color: #378ADD; border: 0.5px solid rgba(55,138,221,0.4); border-radius: var(--radius); padding: 5px 12px; font-size: 0.78rem; cursor: pointer; font-family: var(--font); }
    .chat-input-row { display: flex; gap: 8px; }
    .chat-input-row input { flex: 1; background: var(--midnight); border: 0.5px solid var(--slate-light); border-radius: var(--radius); padding: 8px 10px; font-size: 0.82rem; color: #fff; outline: none; font-family: var(--font); }
    .chat-input-row input:focus { border-color: rgba(232,255,71,0.3); }
    /* Result */
    .outcome-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
    .outcome-btn { padding: 12px 8px; border-radius: var(--radius); font-size: 0.875rem; font-weight: 600; cursor: pointer; font-family: var(--font); border: 0.5px solid var(--slate-light); background: var(--midnight); color: var(--gray); transition: all 0.12s; }
    .outcome-btn:hover { color: #fff; border-color: var(--gray); }
    .ob-win.active { background: rgba(74,222,128,0.15); border-color: #4ade80; color: #4ade80; }
    .ob-loss.active { background: rgba(248,113,113,0.15); border-color: #f87171; color: #f87171; }
    .ob-draw.active { background: rgba(232,255,71,0.1); border-color: var(--volt); color: var(--volt); }
    .score-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .score-box { background: var(--midnight); border: 0.5px solid var(--slate-light); border-radius: var(--radius-lg); padding: 16px 12px; text-align: center; }
    .score-lbl { font-size: 0.72rem; color: var(--gray); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
    .score-input-inner { width: 100%; background: transparent; border: none; outline: none; text-align: center; font-size: 2.2rem; font-weight: 700; color: #fff; font-family: var(--font); letter-spacing: -0.03em; }
    .score-input-inner::placeholder { color: var(--slate-light); }
    .score-input-inner::-webkit-outer-spin-button,
    .score-input-inner::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    /* Misc */
    .btn-volt { background: var(--volt); color: var(--midnight); border: none; border-radius: var(--radius); padding: 9px 18px; font-size: 0.875rem; font-weight: 600; cursor: pointer; font-family: var(--font); }
    .btn-volt:hover { background: #d4eb3f; }
    .btn-volt:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-full { width: 100%; }
    .info-banner { padding: 12px 14px; border-radius: var(--radius); font-size: 0.82rem; margin-bottom: 12px; }
    .info-banner.warn { background: rgba(255,79,56,0.08); border: 0.5px solid rgba(255,79,56,0.25); color: #f87171; }
    .info-banner.info { background: rgba(55,138,221,0.08); border: 0.5px solid rgba(55,138,221,0.2); color: #378ADD; }
    .info-banner.success { background: rgba(74,222,128,0.08); border: 0.5px solid rgba(74,222,128,0.2); color: #4ade80; }
    .toast-err { background: rgba(248,113,113,0.1); border: 0.5px solid rgba(248,113,113,0.3); border-radius: var(--radius); padding: 8px 12px; font-size: 0.8rem; color: #f87171; margin-bottom: 10px; display: none; }
    .divider { border: none; border-top: 0.5px solid var(--slate-light); margin: 14px 0; }
    .empty-wrap { text-align: center; padding: 60px 24px; }
    .empty-wrap h2 { color: #fff; font-size: 1.2rem; margin-bottom: 8px; }
    .empty-wrap p { color: var(--gray); font-size: 0.9rem; }
    .section-label { font-size: 0.72rem; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <a href="../index.html" style="display:flex;align-items:center;gap:10px;">
      <svg width="22" height="22" viewBox="0 0 42 42" fill="none"><polygon points="21,4 38,32 4,32" fill="none" stroke="#e8ff47" stroke-width="2.5" stroke-linejoin="round"/><circle cx="21" cy="21" r="4" fill="#e8ff47"/></svg>
      <span class="nav-logo-text">arc<span>lo</span></span>
    </a>
  </div>
  <ul class="nav-links">
    <li><a href="dashboard.html" style="color:#fff;font-weight:500;">Dashboard</a></li>
    <li><a href="leaderboard.html">Leaderboard</a></li>
  </ul>
  <div class="nav-actions">
    <button onclick="handleLogout()" class="btn btn-ghost btn-sm">Log out</button>
  </div>
</nav>

<div class="match-wrap">
  <div id="root">
    <div style="text-align:center;padding:60px 0;color:var(--gray);">Loading your match...</div>
  </div>
</div>

<script type="module">
  import { supabase, requireAuth, getPlayer, logOut } from '../js/auth.js'

  const WEEK = 1, SEASON = 1
  const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun']
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December']

  let player = null, match = null, mySlots = [], oppSlots = []
  let selectedDate = null, calYear = new Date().getFullYear(), calMonth = new Date().getMonth()
  let selectedOutcome = null, counterMode = false, pendingProposal = null
  let pollTimer = null

  window.handleLogout = () => logOut()

  // ─── Main render ─────────────────────────────────────────────────────────
  async function render() {
    const root = document.getElementById('root')

    if (!match) {
      root.innerHTML = renderNoMatch()
      bindCalendar('cal2', 'lbl2', 'sel2')
      bindHours('fh2','th2')
      await loadMySlots()
      renderMySlots2()
      return
    }

    const isP1 = match.player_one_id === player.id
    const me = isP1 ? match.player_one : match.player_two
    const opp = isP1 ? match.player_two : match.player_one
    const alreadySubmitted = isP1 ? match.p1_result_submitted : match.p2_result_submitted

    // STATE 3 & 4: time agreed
    if (match.agreed_time) {
      root.innerHTML = renderAgreedState(me, opp, alreadySubmitted)
      if (!alreadySubmitted) bindResultForm(me, opp)
      return
    }

    // STATE 2: match exists, no agreed time
    root.innerHTML = renderSchedulingState(me, opp)
    bindCalendar('cal1', 'lbl1', 'sel1')
    bindHours('fh1','th1')
    await loadMySlots()
    await loadOppSlots(opp.id)
    renderMySlots1()
    renderOverlap()
    await loadChat()
    await checkPendingProposal(opp)
  }

  // ─── State renderers ──────────────────────────────────────────────────────
  function renderFixtureMeta(me, opp) {
    return `
      <div class="fixture-vs">
        <div class="fixture-player">
          <div class="fixture-player-name">${me.username}</div>
          <div class="fixture-player-stats">${me.wins}W ${me.losses}L · ${me.points} pts</div>
        </div>
        <div class="fixture-vs-label">vs</div>
        <div class="fixture-player" style="text-align:right;">
          <div class="fixture-player-name">${opp.username}</div>
          <div class="fixture-player-stats">${opp.wins}W ${opp.losses}L · ${opp.points} pts</div>
        </div>
      </div>
      <div class="fixture-meta">
        <div class="fixture-meta-row"><span class="fixture-meta-label">Division</span><span class="fixture-meta-val">${cap(match.division)}</span></div>
        <div class="fixture-meta-row"><span class="fixture-meta-label">Week</span><span class="fixture-meta-val">Week ${match.week}</span></div>
        <div class="fixture-meta-row"><span class="fixture-meta-label">Result cutoff</span><span class="fixture-meta-val">Sunday 23:59</span></div>
      </div>`
  }

  function renderSchedulingState(me, opp) {
    return `
      <p style="font-size:0.8rem;font-weight:600;color:var(--volt);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:16px;">Your match this week</p>
      <div class="state-card">
        <div class="state-card-title">Fixture</div>
        ${renderFixtureMeta(me, opp)}
        <div class="fixture-meta-row" style="border-top:0.5px solid var(--slate-light);margin-top:10px;padding-top:10px;">
          <span class="fixture-meta-label">Agreed time</span>
          <span class="fixture-meta-val" style="color:var(--gray-dim);">Not yet agreed</span>
        </div>
      </div>

      <div class="state-card">
        <div class="state-card-title">Your availability</div>
        <p style="font-size:0.82rem;color:var(--gray);margin-bottom:12px;">Add windows when you can play this week. The system finds overlap with your opponent so you can propose a time.</p>
        <div id="my-slots-1"></div>
        <div class="cal-wrap">
          <div class="cal-head">
            <button class="cal-nav" onclick="prevMonth()">&#8249;</button>
            <span class="cal-month-label" id="lbl1">--</span>
            <button class="cal-nav" onclick="nextMonth()">&#8250;</button>
          </div>
          <div class="cal-grid" id="cal1"></div>
          <div class="sel-date" id="sel1"></div>
          <div class="time-grid">
            <div>
              <div class="time-label">From</div>
              <div class="time-pair">
                <select class="t-sel" id="fh1"></select>
                <select class="t-sel" id="fm1"><option value="00">:00</option><option value="30">:30</option></select>
              </div>
            </div>
            <div>
              <div class="time-label">To</div>
              <div class="time-pair">
                <select class="t-sel" id="th1"></select>
                <select class="t-sel" id="tm1"><option value="00">:00</option><option value="30">:30</option></select>
              </div>
            </div>
          </div>
          <div class="toast-err" id="avail-err"></div>
          <button class="btn-volt btn-full" onclick="addSlot1()">Add availability window</button>
        </div>
        <div id="overlap-section"></div>
      </div>

      <div class="state-card">
        <div class="state-card-title">Match chat</div>
        <div class="chat-msgs" id="chat-msgs"><div style="color:var(--gray);font-size:0.82rem;font-style:italic;">Loading messages...</div></div>
        <div class="chat-input-row">
          <input type="text" id="chat-in" placeholder="Message your opponent..." maxlength="200">
          <button class="btn-volt" onclick="sendMsg()">Send</button>
        </div>
      </div>`
  }

  function renderAgreedState(me, opp, alreadySubmitted) {
    const timeStr = new Date(match.agreed_time).toLocaleString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit', hour12: false })

    let resultSection = ''
    if (match.status === 'disputed') {
      resultSection = `<div class="info-banner warn">Your result is in dispute — admin is reviewing and will make the final decision.</div>`
    } else if (match.status === 'completed') {
      const won = match.winner_id === player.id
      const draw = !match.winner_id
      resultSection = draw
        ? `<div class="info-banner info">Match ended in a draw — 1 point each.</div>`
        : won
          ? `<div class="info-banner success">You won this match — 3 points awarded.</div>`
          : `<div class="info-banner warn" style="color:var(--gray);">You lost this match — better luck next week.</div>`
    } else if (alreadySubmitted) {
      resultSection = `<div class="info-banner info">Result submitted — waiting for your opponent to confirm.</div>`
    } else {
      resultSection = `<div id="result-form">
        <div class="section-label">Submit your result</div>
        <div class="outcome-grid">
          <button class="outcome-btn ob-win" onclick="pickOutcome('win')">Win</button>
          <button class="outcome-btn ob-loss" onclick="pickOutcome('loss')">Loss</button>
          <button class="outcome-btn ob-draw" onclick="pickOutcome('draw')">Draw</button>
        </div>
        <div id="score-section" style="display:none;">
          <div class="score-pair">
            <div class="score-box"><div class="score-lbl" id="my-lbl">${me.username} (you)</div><input class="score-input-inner" type="number" id="my-sc" min="0" placeholder="0"></div>
            <div class="score-box"><div class="score-lbl" id="opp-lbl">${opp.username}</div><input class="score-input-inner" type="number" id="opp-sc" min="0" placeholder="0"></div>
          </div>
        </div>
        <div class="toast-err" id="result-err"></div>
        <button class="btn-volt btn-full" id="submit-btn" onclick="submitResult()" style="display:none;">Submit result</button>
      </div>`
    }

    return `
      <p style="font-size:0.8rem;font-weight:600;color:var(--volt);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:16px;">Your match this week</p>
      <div class="state-card">
        <div class="state-card-title">Fixture</div>
        ${renderFixtureMeta(me, opp)}
        <div class="fixture-meta-row" style="border-top:0.5px solid var(--slate-light);margin-top:10px;padding-top:10px;">
          <span class="fixture-meta-label">Agreed time</span>
          <span class="agreed-badge">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            ${timeStr}
          </span>
        </div>
        <div class="divider"></div>
        ${resultSection}
      </div>`
  }

  function renderNoMatch() {
    return `
      <div class="empty-wrap">
        <h2>No match this week</h2>
        <p>Add your availability below so you get paired when fixtures are generated on Monday.</p>
      </div>
      <div class="state-card">
        <div class="state-card-title">Your availability this week</div>
        <div id="my-slots-2"></div>
        <div class="cal-wrap">
          <div class="cal-head">
            <button class="cal-nav" onclick="prevMonth()">&#8249;</button>
            <span class="cal-month-label" id="lbl2">--</span>
            <button class="cal-nav" onclick="nextMonth()">&#8250;</button>
          </div>
          <div class="cal-grid" id="cal2"></div>
          <div class="sel-date" id="sel2"></div>
          <div class="time-grid">
            <div>
              <div class="time-label">From</div>
              <div class="time-pair">
                <select class="t-sel" id="fh2"></select>
                <select class="t-sel" id="fm2"><option value="00">:00</option><option value="30">:30</option></select>
              </div>
            </div>
            <div>
              <div class="time-label">To</div>
              <div class="time-pair">
                <select class="t-sel" id="th2"></select>
                <select class="t-sel" id="tm2"><option value="00">:00</option><option value="30">:30</option></select>
              </div>
            </div>
          </div>
          <div class="toast-err" id="avail-err2"></div>
          <button class="btn-volt btn-full" onclick="addSlot2()">Add availability window</button>
        </div>
      </div>`
  }

  // ─── Calendar ─────────────────────────────────────────────────────────────
  function bindCalendar(gridId, labelId, dispId) {
    renderCal(gridId, labelId, dispId)
  }

  function renderCal(gridId, labelId, dispId) {
    const label = document.getElementById(labelId)
    const grid = document.getElementById(gridId)
    if (!label || !grid) return
    label.textContent = `${MONTHS[calMonth]} ${calYear}`
    grid.innerHTML = ''
    DAYS.forEach(d => { const e = document.createElement('div'); e.className = 'cal-dl'; e.textContent = d; grid.appendChild(e) })
    const first = new Date(calYear, calMonth, 1)
    const offset = (first.getDay() + 6) % 7
    const daysIn = new Date(calYear, calMonth + 1, 0).getDate()
    const today = new Date(); today.setHours(0,0,0,0)
    for (let i = 0; i < offset; i++) { const e = document.createElement('div'); e.className = 'cal-day empty'; grid.appendChild(e) }
    for (let d = 1; d <= daysIn; d++) {
      const e = document.createElement('div')
      const date = new Date(calYear, calMonth, d); date.setHours(0,0,0,0)
      e.className = 'cal-day'
      e.textContent = d
      if (date < today) e.classList.add('past')
      if (date.toDateString() === today.toDateString()) e.classList.add('today')
      if (selectedDate && date.toDateString() === selectedDate.toDateString()) e.classList.add('selected')
      e.onclick = () => {
        selectedDate = new Date(calYear, calMonth, d)
        const disp = document.getElementById(dispId)
        if (disp) disp.textContent = 'Selected: ' + selectedDate.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' })
        refreshCals()
      }
      grid.appendChild(e)
    }
  }

  function refreshCals() {
    renderCal('cal1','lbl1','sel1')
    renderCal('cal2','lbl2','sel2')
  }

  window.prevMonth = () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear-- } refreshCals() }
  window.nextMonth = () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++ } refreshCals() }

  function bindHours(fromId, toId) {
    [fromId, toId].forEach((id, i) => {
      const el = document.getElementById(id)
      if (!el) return
      for (let h = 0; h < 24; h++) {
        const o = document.createElement('option')
        o.value = String(h).padStart(2,'0')
        o.textContent = String(h).padStart(2,'0') + ':00'
        el.appendChild(o)
      }
      el.value = i === 0 ? '18' : '21'
    })
  }

  // ─── Availability slots ───────────────────────────────────────────────────
  async function loadMySlots() {
    const { data } = await supabase.from('availability').select('*')
      .eq('player_id', player.id).eq('week', WEEK).eq('season', SEASON).order('slot_time')
    mySlots = data || []
  }

  async function loadOppSlots(oppId) {
    const { data } = await supabase.from('availability').select('*')
      .eq('player_id', oppId).eq('week', WEEK).eq('season', SEASON).order('slot_time')
    oppSlots = data || []
  }

  function fmtSlot(s) {
    const from = new Date(s.slot_time).toLocaleString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', hour12: false })
    const to = s.slot_end ? ' – ' + new Date(s.slot_end).toLocaleString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false }) : ''
    return from + to
  }

  function renderMySlots1() {
    const el = document.getElementById('my-slots-1')
    if (!el) return
    el.innerHTML = mySlots.length === 0
      ? '<p style="font-size:0.8rem;color:var(--gray-dim);margin-bottom:10px;">No windows added yet.</p>'
      : mySlots.map(s => `<div class="avail-slot"><span>${fmtSlot(s)}</span><button class="avail-slot-remove" onclick="removeSlot('${s.id}')">×</button></div>`).join('')
  }

  function renderMySlots2() {
    const el = document.getElementById('my-slots-2')
    if (!el) return
    el.innerHTML = mySlots.length === 0
      ? '<p style="font-size:0.8rem;color:var(--gray-dim);margin-bottom:10px;">No windows added yet.</p>'
      : mySlots.map(s => `<div class="avail-slot"><span>${fmtSlot(s)}</span><button class="avail-slot-remove" onclick="removeSlot('${s.id}')">×</button></div>`).join('')
  }

  async function doAddSlot(fhId, fmId, thId, tmId, errId) {
    const eEl = document.getElementById(errId)
    if (eEl) eEl.style.display = 'none'
    if (!selectedDate) { showErr(errId, 'Please select a date on the calendar first.'); return }
    if (mySlots.length >= 5) { showErr(errId, 'Maximum 5 windows per week.'); return }
    const fh = parseInt(document.getElementById(fhId).value)
    const fm = parseInt(document.getElementById(fmId).value)
    const th = parseInt(document.getElementById(thId).value)
    const tm = parseInt(document.getElementById(tmId).value)
    const from = new Date(selectedDate); from.setHours(fh, fm, 0, 0)
    const to = new Date(selectedDate); to.setHours(th, tm, 0, 0)
    if (to <= from) { showErr(errId, 'End time must be after start time.'); return }
    const { error } = await supabase.from('availability').insert({ player_id: player.id, week: WEEK, season: SEASON, slot_time: from.toISOString(), slot_end: to.toISOString() })
    if (error) { showErr(errId, 'Could not add window.'); return }
    await loadMySlots()
    renderMySlots1()
    renderMySlots2()
    renderOverlap()
  }

  window.addSlot1 = () => doAddSlot('fh1','fm1','th1','tm1','avail-err')
  window.addSlot2 = () => doAddSlot('fh2','fm2','th2','tm2','avail-err2')

  window.removeSlot = async (id) => {
    await supabase.from('availability').delete().eq('id', id)
    await loadMySlots()
    renderMySlots1()
    renderMySlots2()
    renderOverlap()
  }

  // ─── Overlap detection ────────────────────────────────────────────────────
  function genSlots(from, to) {
    const slots = [], cur = new Date(from), end = new Date(to)
    while (cur < end) { slots.push(new Date(cur)); cur.setMinutes(cur.getMinutes() + 30) }
    return slots
  }

  function findOverlap() {
    const all = []
    for (const opp of oppSlots) {
      const of = new Date(opp.slot_time), ot = opp.slot_end ? new Date(opp.slot_end) : new Date(of.getTime() + 3600000)
      for (const my of mySlots) {
        const mf = new Date(my.slot_time), mt = my.slot_end ? new Date(my.slot_end) : new Date(mf.getTime() + 3600000)
        const start = new Date(Math.max(of, mf)), end = new Date(Math.min(ot, mt))
        if (start < end) all.push(...genSlots(start, end))
      }
    }
    const seen = new Set()
    return all.filter(s => { const k = s.toISOString(); if (seen.has(k)) return false; seen.add(k); return true }).sort((a,b) => a-b)
  }

  function renderOverlap() {
    const el = document.getElementById('overlap-section')
    if (!el) return
    if (mySlots.length === 0 || oppSlots.length === 0) {
      el.innerHTML = oppSlots.length === 0
        ? '<div class="info-banner info" style="margin-top:12px;">Your opponent hasn\'t added availability yet. Add your windows and check back later.</div>'
        : ''
      return
    }
    const slots = findOverlap()
    if (slots.length === 0) {
      el.innerHTML = '<div class="info-banner warn" style="margin-top:12px;">No overlapping times found with your opponent. Add more availability windows or use the chat to discuss.</div>'
      return
    }
    const byDay = {}
    slots.forEach(s => {
      const k = s.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'short' })
      if (!byDay[k]) byDay[k] = []
      byDay[k].push(s)
    })
    el.innerHTML = `
      <div class="divider"></div>
      <div class="section-label">Propose a time — overlap with your opponent</div>
      ${Object.entries(byDay).map(([day, daySlots]) => `
        <div class="overlap-day">
          <div class="overlap-day-name">${day}</div>
          <div class="slot-grid">
            ${daySlots.map(s => {
              const t = s.toLocaleString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false })
              return `<button class="slot-btn" onclick="proposeSlot('${s.toISOString()}','${day} ${t}')">${t}</button>`
            }).join('')}
          </div>
        </div>`).join('')}`
  }

  // ─── Proposals ────────────────────────────────────────────────────────────
  window.proposeSlot = async (isoTime, label) => {
    await supabase.from('match_messages').insert({
      match_id: match.id, sender_id: player.id,
      message: `Proposed: ${label}`, type: 'proposal', proposed_time: isoTime
    })
    counterMode = false
    await loadChat()
  }

  async function checkPendingProposal(opp) {
    const { data } = await supabase.from('match_messages').select('*')
      .eq('match_id', match.id).eq('type', 'proposal').neq('sender_id', player.id)
      .order('created_at', { ascending: false }).limit(1)
    if (!data || !data.length) return
    const latest = data[0]
    const { data: resp } = await supabase.from('match_messages').select('type')
      .eq('match_id', match.id).in('type', ['confirmed','declined'])
      .gt('created_at', latest.created_at).limit(1)
    if (resp && resp.length) return
    pendingProposal = latest
    const msgs = document.getElementById('chat-msgs')
    if (msgs) {
      const timeStr = new Date(latest.proposed_time).toLocaleString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit', hour12: false })
      const banner = document.createElement('div')
      banner.className = 'info-banner info'
      banner.style.marginBottom = '12px'
      banner.innerHTML = `<strong>${opp.username} proposed:</strong> ${timeStr}<div class="proposal-actions" style="margin-top:8px;"><button class="btn-accept" onclick="acceptProposal()">Accept</button><button class="btn-counter" onclick="showCounter()">Counter</button></div>`
      msgs.parentElement.insertBefore(banner, msgs)
    }
  }

  window.acceptProposal = async () => {
    if (!pendingProposal) return
    const { error } = await supabase.from('matches').update({ agreed_time: pendingProposal.proposed_time }).eq('id', match.id)
    if (error) { alert('Could not save agreed time: ' + error.message); return }
    await supabase.from('match_messages').insert({ match_id: match.id, sender_id: player.id, message: 'Time accepted', type: 'confirmed', proposed_time: pendingProposal.proposed_time })
    match.agreed_time = pendingProposal.proposed_time
    pendingProposal = null
    await render()
  }

  window.showCounter = () => {
    counterMode = true
    const el = document.getElementById('overlap-section')
    if (el) el.scrollIntoView({ behavior: 'smooth' })
  }

  // ─── Chat ─────────────────────────────────────────────────────────────────
  async function loadChat() {
    const el = document.getElementById('chat-msgs')
    if (!el) return
    const { data } = await supabase.from('match_messages').select('*, sender:sender_id(username)').eq('match_id', match.id).order('created_at')
    if (!data || !data.length) { el.innerHTML = '<div style="color:var(--gray);font-size:0.82rem;font-style:italic;">No messages yet.</div>'; return }
    el.innerHTML = data.map(m => {
      const mine = m.sender_id === player.id
      const sender = m.sender?.username || '?'
      const t = new Date(m.created_at).toLocaleString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false, day: 'numeric', month: 'short' })
      if (m.type === 'confirmed') return `<div class="msg-row"><div class="msg-bubble sys">Match time confirmed — ${m.proposed_time ? new Date(m.proposed_time).toLocaleString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', hour12: false }) : ''}</div></div>`
      if (m.type === 'declined') return `<div class="msg-row"><div class="msg-bubble sys">Time declined — please propose another slot</div></div>`
      if (m.type === 'proposal') {
        const pt = new Date(m.proposed_time).toLocaleString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', hour12: false })
        return `<div class="msg-row ${mine ? 'mine' : 'theirs'}"><span class="msg-sender">${sender} · ${t}</span><div class="msg-bubble proposal"><div class="proposal-label">Proposed time</div>${pt}</div></div>`
      }
      return `<div class="msg-row ${mine ? 'mine' : 'theirs'}"><span class="msg-sender">${sender} · ${t}</span><div class="msg-bubble ${mine ? 'mine' : 'theirs'}">${m.message.replace(/</g,'&lt;')}</div></div>`
    }).join('')
    el.scrollTop = el.scrollHeight
    const inp = document.getElementById('chat-in')
    if (inp) inp.onkeydown = e => { if (e.key === 'Enter') sendMsg() }
  }

  window.sendMsg = async () => {
    const inp = document.getElementById('chat-in')
    const msg = inp?.value.trim()
    if (!msg) return
    inp.value = ''
    await supabase.from('match_messages').insert({ match_id: match.id, sender_id: player.id, message: msg, type: 'message' })
    await loadChat()
  }

  // ─── Result ───────────────────────────────────────────────────────────────
  function bindResultForm(me, opp) {
    // already rendered in HTML
  }

  window.pickOutcome = (outcome) => {
    selectedOutcome = outcome
    document.querySelectorAll('.outcome-btn').forEach(b => b.classList.remove('active'))
    document.querySelector('.ob-' + outcome)?.classList.add('active')
    const scoreSection = document.getElementById('score-section')
    const submitBtn = document.getElementById('submit-btn')
    if (scoreSection) scoreSection.style.display = outcome === 'draw' ? 'none' : 'block'
    if (submitBtn) submitBtn.style.display = 'block'
  }

  window.submitResult = async () => {
    const eEl = document.getElementById('result-err')
    const btn = document.getElementById('submit-btn')
    if (eEl) eEl.style.display = 'none'
    if (!selectedOutcome) { showErr('result-err', 'Please select Win, Loss or Draw.'); return }
    let myScore = 0, oppScore = 0
    if (selectedOutcome !== 'draw') {
      myScore = parseInt(document.getElementById('my-sc')?.value)
      oppScore = parseInt(document.getElementById('opp-sc')?.value)
      if (isNaN(myScore) || isNaN(oppScore)) { showErr('result-err', 'Please enter both scores.'); return }
      if (selectedOutcome === 'win' && myScore <= oppScore) { showErr('result-err', 'Your score must be higher for a win.'); return }
      if (selectedOutcome === 'loss' && oppScore <= myScore) { showErr('result-err', 'Opponent score must be higher for a loss.'); return }
    }
    if (btn) { btn.disabled = true; btn.textContent = 'Submitting...' }
    const isP1 = match.player_one_id === player.id

    // Insert result
    const { error: resultError } = await supabase.from('match_results').insert({
      match_id: match.id, submitted_by: player.id, my_score: myScore, opponent_score: oppScore
    })
    if (resultError) {
      showErr('result-err', resultError.code === '23505' ? 'You have already submitted a result.' : 'Could not submit. Try again.')
      if (btn) { btn.disabled = false; btn.textContent = 'Submit result' }
      return
    }

    // Mark as submitted
    const { error: flagError } = await supabase.from('matches')
      .update(isP1 ? { p1_result_submitted: true } : { p2_result_submitted: true })
      .eq('id', match.id)
    if (flagError) console.error('Flag error:', flagError)

    // Check if both submitted
    const { data: results } = await supabase.from('match_results').select('*').eq('match_id', match.id)
    if (results && results.length === 2) {
      const r1 = results[0], r2 = results[1]
      const scoresMatch = r1.my_score === r2.opponent_score && r1.opponent_score === r2.my_score

      if (scoresMatch) {
        const winnerId = myScore > oppScore ? player.id
          : myScore < oppScore ? (isP1 ? match.player_two_id : match.player_one_id)
          : null
        const { error: completeError } = await supabase.from('matches').update({
          status: 'completed', winner_id: winnerId, draw_reason: winnerId ? null : 'score'
        }).eq('id', match.id)
        if (completeError) console.error('Complete error:', completeError)

        // Update points
        if (winnerId) {
          await supabase.rpc('increment_wins', { pid: winnerId })
          await supabase.rpc('increment_points', { pid: winnerId, amt: 3 })
          const loserId = winnerId === match.player_one_id ? match.player_two_id : match.player_one_id
          await supabase.rpc('increment_losses', { pid: loserId })
        } else {
          await supabase.rpc('increment_points', { pid: match.player_one_id, amt: 1 })
          await supabase.rpc('increment_points', { pid: match.player_two_id, amt: 1 })
        }
      } else {
        const { error: disputeError } = await supabase.from('matches')
          .update({ status: 'disputed' }).eq('id', match.id)
        if (disputeError) console.error('Dispute error:', disputeError)

        const { error: disputeInsertError } = await supabase.from('disputes').insert({
          match_id: match.id, player_one_claim: r1, player_two_claim: r2
        })
        if (disputeInsertError) console.error('Dispute insert error:', disputeInsertError)
      }
    }

    match.p1_result_submitted = isP1 ? true : match.p1_result_submitted
    match.p2_result_submitted = !isP1 ? true : match.p2_result_submitted
    if (btn) { btn.disabled = false; btn.textContent = 'Submit result' }
    await render()
  }

  // ─── Helpers ──────────────────────────────────────────────────────────────
  function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : '' }
  function showErr(id, msg) { const el = document.getElementById(id); if (el) { el.textContent = msg; el.style.display = 'block' } }

  // ─── Init ─────────────────────────────────────────────────────────────────
  async function init() {
    const session = await requireAuth()
    if (!session) return
    player = await getPlayer()
    if (!player) return

    const { data: matches } = await supabase
      .from('matches')
      .select(`*, player_one:player_one_id(id,username,wins,losses,points,division), player_two:player_two_id(id,username,wins,losses,points,division)`)
      .or(`player_one_id.eq.${player.id},player_two_id.eq.${player.id}`)
      .eq('season', SEASON).eq('week', WEEK)
      .not('status', 'in', '("cancelled")')
      .limit(1)

    match = matches && matches.length ? matches[0] : null
    await render()

    pollTimer = setInterval(async () => {
      if (match && !match.agreed_time) await loadChat()
    }, 15000)
  }

  init()
</script>
