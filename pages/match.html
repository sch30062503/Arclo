<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Match — Arclo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .match-wrap { max-width: 640px; margin: 48px auto; padding: 0 24px 48px; }
    .state-card { background: var(--slate); border: 0.5px solid var(--slate-light); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 14px; }
    .state-card-title { font-size: 0.75rem; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
    .fixture-vs { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .fixture-player { flex: 1; }
    .fixture-player-name { font-size: 1.15rem; font-weight: 600; color: #fff; }
    .fixture-player-stats { font-size: 0.75rem; color: var(--gray); margin-top: 3px; }
    .fixture-vs-label { font-size: 1rem; color: var(--gray-dim); font-weight: 600; flex-shrink: 0; }
    .fixture-meta-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; padding: 8px 0; border-bottom: 0.5px solid var(--slate-light); }
    .fixture-meta-row:last-child { border-bottom: none; }
    .fixture-meta-label { color: var(--gray); }
    .fixture-meta-val { color: #fff; font-weight: 500; }
    /* Countdown */
    .countdown-wrap { background: var(--midnight); border: 0.5px solid var(--slate-light); border-radius: var(--radius-lg); padding: 20px; text-align: center; margin: 20px 0 0; }
    .countdown-label { font-size: 0.72rem; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .countdown-timer { display: flex; justify-content: center; gap: 16px; }
    .countdown-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .countdown-num { font-size: 2rem; font-weight: 700; color: #fff; letter-spacing: -0.03em; line-height: 1; }
    .countdown-unit-label { font-size: 0.65rem; color: var(--gray); text-transform: uppercase; letter-spacing: 0.06em; }
    .countdown-sep { font-size: 2rem; font-weight: 700; color: var(--gray-dim); line-height: 1; padding-top: 2px; }
    .match-live-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,79,56,0.12); border: 0.5px solid rgba(255,79,56,0.3); border-radius: 999px; padding: 4px 12px; font-size: 0.8rem; color: var(--ignite); font-weight: 600; margin-bottom: 16px; }
    .live-dot-red { width: 6px; height: 6px; border-radius: 50%; background: var(--ignite); animation: pulse 1.5s infinite; }
    /* Result */
    .outcome-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
    .outcome-btn { padding: 12px 8px; border-radius: var(--radius); font-size: 0.875rem; font-weight: 600; cursor: pointer; font-family: var(--font); border: 0.5px solid var(--slate-light); background: var(--midnight); color: var(--gray); transition: all 0.12s; }
    .outcome-btn:hover { color: #fff; border-color: var(--gray); }
    .ob-win.active { background: rgba(74,222,128,0.15); border-color: #4ade80; color: #4ade80; }
    .ob-loss.active { background: rgba(248,113,113,0.15); border-color: #f87171; color: #f87171; }
    .ob-draw.active { background: rgba(232,255,71,0.1); border-color: var(--volt); color: var(--volt); }
    .score-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .score-box { background: var(--midnight); border: 0.5px solid var(--slate-light); border-radius: var(--radius-lg); padding: 16px 12px; text-align: center; }
    .score-lbl { font-size: 0.72rem; color: var(--gray); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
    .score-input-inner { width: 100%; background: transparent; border: none; outline: none; text-align: center; font-size: 2.2rem; font-weight: 700; color: #fff; font-family: var(--font); }
    .score-input-inner::-webkit-outer-spin-button,
    .score-input-inner::-webkit-inner-spin-button { -webkit-appearance: none; }
    .btn-volt { background: var(--volt); color: var(--midnight); border: none; border-radius: var(--radius); padding: 9px 18px; font-size: 0.875rem; font-weight: 600; cursor: pointer; font-family: var(--font); }
    .btn-volt:hover { background: #d4eb3f; }
    .btn-volt:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-full { width: 100%; }
    .info-banner { padding: 12px 14px; border-radius: var(--radius); font-size: 0.82rem; margin-bottom: 12px; }
    .info-banner.warn { background: rgba(255,79,56,0.08); border: 0.5px solid rgba(255,79,56,0.25); color: #f87171; }
    .info-banner.info { background: rgba(55,138,221,0.08); border: 0.5px solid rgba(55,138,221,0.2); color: #378ADD; }
    .info-banner.success { background: rgba(74,222,128,0.08); border: 0.5px solid rgba(74,222,128,0.2); color: #4ade80; }
    .toast-err { background: rgba(248,113,113,0.1); border: 0.5px solid rgba(248,113,113,0.3); border-radius: var(--radius); padding: 8px 12px; font-size: 0.8rem; color: #f87171; margin-bottom: 10px; display: none; }
    .divider { border: none; border-top: 0.5px solid var(--slate-light); margin: 14px 0; }
    .section-label { font-size: 0.72rem; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
    .agreed-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(74,222,128,0.12); border: 0.5px solid rgba(74,222,128,0.3); border-radius: 999px; padding: 3px 10px; font-size: 0.8rem; color: #4ade80; font-weight: 500; }
    .archive-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid var(--slate-light); font-size: 0.85rem; }
    .archive-item:last-child { border-bottom: none; }
    .archive-result { font-size: 0.78rem; font-weight: 600; padding: 2px 8px; border-radius: 999px; }
    .result-win { background: rgba(74,222,128,0.12); color: #4ade80; }
    .result-loss { background: rgba(248,113,113,0.12); color: #f87171; }
    .result-draw { background: rgba(232,255,71,0.1); color: var(--volt); }
    .result-disputed { background: rgba(55,138,221,0.1); color: #378ADD; }
    .no-show-banner { background: rgba(255,79,56,0.08); border: 0.5px solid rgba(255,79,56,0.25); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 16px; font-size: 0.85rem; color: #f87171; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <a href="../index.html" style="display:flex;align-items:center;gap:10px;">
      <svg width="22" height="22" viewBox="0 0 42 42" fill="none"><polygon points="21,4 38,32 4,32" fill="none" stroke="#e8ff47" stroke-width="2.5" stroke-linejoin="round"/><circle cx="21" cy="21" r="4" fill="#e8ff47"/></svg>
      <span class="nav-logo-text">arc<span>lo</span></span>
    </a>
  </div>
  <ul class="nav-links">
    <li><a href="dashboard.html" style="color:#fff;font-weight:500;">Dashboard</a></li>
    <li><a href="leaderboard.html">Leaderboard</a></li>
  </ul>
  <div class="nav-actions">
    <button onclick="handleLogout()" class="btn btn-ghost btn-sm">Log out</button>
  </div>
</nav>

<div class="match-wrap">
  <div id="root"><div style="text-align:center;padding:60px 0;color:var(--gray);">Loading your match...</div></div>
</div>

<script type="module">
  import { supabase, requireAuth, getPlayer, logOut } from '../js/auth.js'

  let player = null, match = null, tournament = null, archivedMatches = []
  let selectedOutcome = null, countdownInterval = null
  const SEASON = 1

  window.handleLogout = () => logOut()

  async function render() {
    const root = document.getElementById('root')
    if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null }

    if (!match) {
      root.innerHTML = renderNoMatch()
      return
    }

    const isP1 = match.player_one_id === player.id
    const me = isP1 ? match.player_one : match.player_two
    const opp = isP1 ? match.player_two : match.player_one
    const alreadySubmitted = isP1 ? match.p1_result_submitted : match.p2_result_submitted
    const now = new Date()
    const matchTime = match.scheduled_at ? new Date(match.scheduled_at) : null
    const kickedOff = matchTime && now >= matchTime
    const midnight = matchTime ? new Date(matchTime) : null
    if (midnight) midnight.setHours(23, 59, 59, 999)
    const isPastDeadline = midnight && now > midnight

    if (match.status === 'completed' || match.status === 'disputed') {
      root.innerHTML = renderResultState(me, opp)
      renderArchive()
      return
    }

    root.innerHTML = renderFixtureState(me, opp, kickedOff, alreadySubmitted, matchTime, isPastDeadline)
    if (!kickedOff && matchTime) startCountdown(matchTime)
    if (kickedOff && !alreadySubmitted) bindResultForm()
    renderArchive()
  }

  function renderFixtureMeta(me, opp) {
    return `<div class="fixture-vs">
      <div class="fixture-player">
        <div class="fixture-player-name">${me.username}</div>
        <div class="fixture-player-stats">${me.wins}W ${me.losses}L · ${me.points} pts</div>
      </div>
      <div class="fixture-vs-label">vs</div>
      <div class="fixture-player" style="text-align:right;">
        <div class="fixture-player-name">${opp.username}</div>
        <div class="fixture-player-stats">${opp.wins}W ${opp.losses}L · ${opp.points} pts</div>
      </div>
    </div>`
  }

  function renderFixtureState(me, opp, kickedOff, alreadySubmitted, matchTime, isPastDeadline) {
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']
    const matchDay = matchTime ? matchTime.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' }) : 'TBC'
    const matchTimeStr = matchTime ? matchTime.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', hour12:false }) : '--:--'

    let resultSection = ''
    if (alreadySubmitted) {
      resultSection = `<div class="info-banner success">Result submitted — waiting for your opponent.</div>`
    } else if (isPastDeadline) {
      resultSection = `<div class="info-banner warn">Match deadline has passed. If your opponent submitted a result, the admin will process the outcome.</div>`
    } else if (kickedOff) {
      resultSection = `
        <div class="divider"></div>
        <div class="section-label">Submit your result</div>
        <div class="outcome-grid">
          <button class="outcome-btn ob-win" onclick="pickOutcome('win')">Win</button>
          <button class="outcome-btn ob-loss" onclick="pickOutcome('loss')">Loss</button>
          <button class="outcome-btn ob-draw" onclick="pickOutcome('draw')">Draw</button>
        </div>
        <div id="score-section" style="display:none;">
          <div class="score-pair">
            <div class="score-box"><div class="score-lbl" id="my-lbl">${me.username} (you)</div><input class="score-input-inner" type="number" id="my-sc" min="0" placeholder="0"></div>
            <div class="score-box"><div class="score-lbl" id="opp-lbl">${opp.username}</div><input class="score-input-inner" type="number" id="opp-sc" min="0" placeholder="0"></div>
          </div>
        </div>
        <div class="toast-err" id="result-err"></div>
        <button class="btn-volt btn-full" id="submit-btn" onclick="submitResult()" style="display:none;">Submit result</button>`
    } else {
      resultSection = `<div class="countdown-wrap">
        <div class="countdown-label">Match starts in</div>
        <div class="countdown-timer" id="countdown-timer">
          <div class="countdown-unit"><div class="countdown-num" id="cd-days">--</div><div class="countdown-unit-label">Days</div></div>
          <div class="countdown-sep">:</div>
          <div class="countdown-unit"><div class="countdown-num" id="cd-hours">--</div><div class="countdown-unit-label">Hours</div></div>
          <div class="countdown-sep">:</div>
          <div class="countdown-unit"><div class="countdown-num" id="cd-mins">--</div><div class="countdown-unit-label">Mins</div></div>
          <div class="countdown-sep">:</div>
          <div class="countdown-unit"><div class="countdown-num" id="cd-secs">--</div><div class="countdown-unit-label">Secs</div></div>
        </div>
      </div>`
    }

    return `
      <p style="font-size:0.8rem;font-weight:600;color:var(--volt);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:16px;">Your match this week</p>
      ${kickedOff ? '<div class="match-live-badge"><div class="live-dot-red"></div>Match day</div>' : ''}
      <div class="state-card">
        <div class="state-card-title">Fixture — ${tournament?.name || 'Tournament'}</div>
        ${renderFixtureMeta(me, opp)}
        <div class="fixture-meta-row"><span class="fixture-meta-label">Division</span><span class="fixture-meta-val">${cap(match.division)}</span></div>
        <div class="fixture-meta-row"><span class="fixture-meta-label">Week</span><span class="fixture-meta-val">Week ${match.week}</span></div>
        <div class="fixture-meta-row"><span class="fixture-meta-label">Match day</span><span class="fixture-meta-val">${matchDay}</span></div>
        <div class="fixture-meta-row"><span class="fixture-meta-label">Kick-off</span><span class="fixture-meta-val" style="color:var(--volt);font-weight:600;">${matchTimeStr}</span></div>
        <div class="fixture-meta-row"><span class="fixture-meta-label">No-show deadline</span><span class="fixture-meta-val">Midnight tonight</span></div>
        ${resultSection}
      </div>`
  }

  function renderResultState(me, opp) {
    let msg = ''
    if (match.status === 'disputed') {
      const isP1 = match.player_one_id === player.id
      const myEvidence = isP1 ? match.p1_evidence : match.p2_evidence
      msg = `<div class="info-banner warn" style="margin-bottom:12px;">Your result is in dispute. Upload evidence — a screenshot or Rocket League replay file. If neither player uploads by Monday, it's a draw. If only one uploads, that player wins.</div>
        ${myEvidence
          ? `<div class="info-banner success">Evidence uploaded — admin will review.</div>`
          : `<div>
              <input type="file" id="evidence-file" accept="image/*,.replay" style="display:none;" onchange="handleEvidenceUpload()">
              <button class="btn-volt" onclick="document.getElementById('evidence-file').click()">Upload evidence</button>
              <div class="toast-err" id="evidence-err" style="margin-top:10px;"></div>
              <div id="evidence-progress" style="display:none;font-size:0.8rem;color:var(--gray);margin-top:8px;">Uploading...</div>
            </div>`}`
    } else if (match.status === 'completed') {
      const won = match.winner_id === player.id
      const draw = !match.winner_id
      msg = draw
        ? `<div class="info-banner info">Match ended in a draw — 1 point each.</div>`
        : won
          ? `<div class="info-banner success">You won — 3 points awarded.</div>`
          : `<div class="info-banner" style="background:rgba(100,100,100,0.08);border:0.5px solid rgba(100,100,100,0.2);color:var(--gray);">You lost this match — better luck next week.</div>`
    }

    const isP1 = match.player_one_id === player.id
    return `
      <p style="font-size:0.8rem;font-weight:600;color:var(--volt);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:16px;">Your match this week</p>
      <div class="state-card">
        <div class="state-card-title">Fixture — ${tournament?.name || 'Tournament'}</div>
        ${renderFixtureMeta(me, opp)}
        <div class="fixture-meta-row"><span class="fixture-meta-label">Division</span><span class="fixture-meta-val">${cap(match.division)}</span></div>
        <div class="fixture-meta-row"><span class="fixture-meta-label">Week</span><span class="fixture-meta-val">Week ${match.week}</span></div>
        <div class="divider"></div>
        ${msg}
      </div>`
  }

  function renderNoMatch() {
    return `<div style="text-align:center;padding:60px 24px;">
      <h2 style="color:#fff;font-size:1.2rem;margin-bottom:8px;">No match this week</h2>
      <p style="color:var(--gray);font-size:0.9rem;margin-bottom:20px;">${
        !player?.tournament_id
          ? 'You haven\'t entered a tournament yet.'
          : 'Fixtures haven\'t been generated yet. Check back Monday.'
      }</p>
      ${!player?.tournament_id
        ? `<a href="tournaments.html" class="btn btn-primary btn-sm">Browse tournaments</a>`
        : `<a href="dashboard.html" class="btn btn-secondary btn-sm">Back to dashboard</a>`
      }
    </div>`
  }

  function startCountdown(matchTime) {
    function tick() {
      const now = new Date()
      const diff = matchTime - now
      if (diff <= 0) {
        clearInterval(countdownInterval)
        render()
        return
      }
      const days = Math.floor(diff / 86400000)
      const hours = Math.floor((diff % 86400000) / 3600000)
      const mins = Math.floor((diff % 3600000) / 60000)
      const secs = Math.floor((diff % 60000) / 1000)
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = String(val).padStart(2,'0') }
      set('cd-days', days); set('cd-hours', hours); set('cd-mins', mins); set('cd-secs', secs)
    }
    tick()
    countdownInterval = setInterval(tick, 1000)
  }

  function bindResultForm() {}

  window.pickOutcome = (outcome) => {
    selectedOutcome = outcome
    document.querySelectorAll('.outcome-btn').forEach(b => b.classList.remove('active'))
    document.querySelector('.ob-' + outcome)?.classList.add('active')
    const scoreSection = document.getElementById('score-section')
    const submitBtn = document.getElementById('submit-btn')
    if (scoreSection) scoreSection.style.display = outcome === 'draw' ? 'none' : 'block'
    if (submitBtn) submitBtn.style.display = 'block'
  }

  window.submitResult = async () => {
    const eEl = document.getElementById('result-err')
    const btn = document.getElementById('submit-btn')
    if (eEl) eEl.style.display = 'none'
    if (!selectedOutcome) { showErr('result-err', 'Please select Win, Loss or Draw.'); return }
    let myScore = 0, oppScore = 0
    if (selectedOutcome !== 'draw') {
      myScore = parseInt(document.getElementById('my-sc')?.value)
      oppScore = parseInt(document.getElementById('opp-sc')?.value)
      if (isNaN(myScore) || isNaN(oppScore)) { showErr('result-err', 'Please enter both scores.'); return }
      if (selectedOutcome === 'win' && myScore <= oppScore) { showErr('result-err', 'Your score must be higher for a win.'); return }
      if (selectedOutcome === 'loss' && oppScore <= myScore) { showErr('result-err', 'Opponent score must be higher for a loss.'); return }
    }
    if (btn) { btn.disabled = true; btn.textContent = 'Submitting...' }
    const isP1 = match.player_one_id === player.id

    const { error: resultError } = await supabase.from('match_results').insert({
      match_id: match.id, submitted_by: player.id, my_score: myScore, opponent_score: oppScore
    })
    if (resultError) {
      showErr('result-err', resultError.code === '23505' ? 'Already submitted.' : 'Could not submit. Try again.')
      if (btn) { btn.disabled = false; btn.textContent = 'Submit result' }
      return
    }

    await supabase.from('matches').update(isP1 ? { p1_result_submitted: true } : { p2_result_submitted: true }).eq('id', match.id)

    const { data: results } = await supabase.from('match_results').select('*').eq('match_id', match.id)
    if (results && results.length === 2) {
      const r1 = results[0], r2 = results[1]
      if (r1.my_score === r2.opponent_score && r1.opponent_score === r2.my_score) {
        const winnerId = myScore > oppScore ? player.id : myScore < oppScore ? (isP1 ? match.player_two_id : match.player_one_id) : null
        const loserId = winnerId ? (winnerId === match.player_one_id ? match.player_two_id : match.player_one_id) : null
        const game = match.game || tournament?.game || 'rocket_league'

        await supabase.from('matches').update({ status:'completed', winner_id:winnerId||null, draw_reason:winnerId?null:'score' }).eq('id', match.id)

        if (winnerId) {
          await supabase.rpc('increment_wins', { pid: winnerId })
          await supabase.rpc('increment_points', { pid: winnerId, amt: 3 })
          await supabase.rpc('increment_losses', { pid: loserId })
          // Update player_games
          const { data: wg } = await supabase.from('player_games').select('wins,points').eq('player_id', winnerId).eq('game', game).single()
          if (wg) await supabase.from('player_games').update({ wins: wg.wins+1, points: wg.points+3 }).eq('player_id', winnerId).eq('game', game)
          const { data: lg } = await supabase.from('player_games').select('losses').eq('player_id', loserId).eq('game', game).single()
          if (lg) await supabase.from('player_games').update({ losses: lg.losses+1 }).eq('player_id', loserId).eq('game', game)
        } else {
          await supabase.rpc('increment_points', { pid: match.player_one_id, amt: 1 })
          await supabase.rpc('increment_points', { pid: match.player_two_id, amt: 1 })
          // Update player_games
          for (const pid of [match.player_one_id, match.player_two_id]) {
            const { data: pg } = await supabase.from('player_games').select('points').eq('player_id', pid).eq('game', game).single()
            if (pg) await supabase.from('player_games').update({ points: pg.points+1 }).eq('player_id', pid).eq('game', game)
          }
        }
      } else {
        await supabase.from('matches').update({ status:'disputed' }).eq('id', match.id)
        await supabase.from('disputes').insert({ match_id: match.id, player_one_claim: r1, player_two_claim: r2 })
      }
    }

    match.p1_result_submitted = isP1 ? true : match.p1_result_submitted
    match.p2_result_submitted = !isP1 ? true : match.p2_result_submitted
    if (btn) { btn.disabled = false; btn.textContent = 'Submit result' }
    await render()
  }

  window.handleEvidenceUpload = async function() {
    const file = document.getElementById('evidence-file')?.files[0]
    if (!file) return
    const errEl = document.getElementById('evidence-err')
    const progress = document.getElementById('evidence-progress')
    if (errEl) errEl.style.display = 'none'
    if (progress) progress.style.display = 'block'
    if (file.size > 10 * 1024 * 1024) { if (errEl) { errEl.textContent = 'Max 10MB.'; errEl.style.display = 'block' }; if (progress) progress.style.display = 'none'; return }
    const isP1 = match.player_one_id === player.id
    const path = `${match.id}/${player.id}/${file.name}`
    const { error } = await supabase.storage.from('evidence').upload(path, file, { upsert: true })
    if (error) { if (errEl) { errEl.textContent = 'Upload failed: ' + error.message; errEl.style.display = 'block' }; if (progress) progress.style.display = 'none'; return }
    const { data: dispute } = await supabase.from('disputes').select('id').eq('match_id', match.id).single()
    if (dispute) await supabase.from('disputes').update(isP1 ? { p1_evidence: path } : { p2_evidence: path }).eq('id', dispute.id)
    if (isP1) match.p1_evidence = path; else match.p2_evidence = path
    if (progress) progress.style.display = 'none'
    await render()
  }

  function renderArchive() {
    if (!archivedMatches?.length) return
    const root = document.getElementById('root')
    if (!root) return
    const div = document.createElement('div')
    div.className = 'state-card'
    div.style.marginTop = '14px'
    div.innerHTML = `<div class="state-card-title">Previous matches this tournament</div>
      ${archivedMatches.map(m => {
        const isP1 = m.player_one_id === player.id
        const opp = isP1 ? m.player_two?.username : m.player_one?.username
        const won = m.winner_id === player.id
        const draw = !m.winner_id && m.status === 'completed'
        const disputed = m.status === 'disputed'
        const cls = disputed ? 'result-disputed' : draw ? 'result-draw' : won ? 'result-win' : 'result-loss'
        const lbl = disputed ? 'Disputed' : draw ? 'Draw' : won ? 'Win' : 'Loss'
        const date = new Date(m.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'short' })
        return `<div class="archive-item"><div><div style="font-weight:500;color:#fff;">vs ${opp||'?'}</div><div style="font-size:0.75rem;color:var(--gray);">Week ${m.week} · ${date}</div></div><span class="archive-result ${cls}">${lbl}</span></div>`
      }).join('')}`
    root.appendChild(div)
  }

  function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : '' }
  function showErr(id, msg) { const el = document.getElementById(id); if (el) { el.textContent = msg; el.style.display = 'block' } }

  async function init() {
    const session = await requireAuth()
    if (!session) return
    player = await getPlayer()
    if (!player) return

    // Get current week from tournament
    let WEEK = 1
    if (player.tournament_id) {
      const { data: t } = await supabase.from('tournaments').select('*').eq('id', player.tournament_id).single()
      tournament = t
      if (t) WEEK = t.current_week
    }

    // Load active match
    const { data: matches } = await supabase
      .from('matches')
      .select(`*, player_one:player_one_id(id,username,wins,losses,points,division), player_two:player_two_id(id,username,wins,losses,points,division)`)
      .or(`player_one_id.eq.${player.id},player_two_id.eq.${player.id}`)
      .eq('season', SEASON).eq('week', WEEK)
      .not('status', 'in', '("cancelled","completed")')
      .limit(1)

    match = matches?.length ? matches[0] : null

    // If disputed, fetch evidence
    if (match?.status === 'disputed') {
      const { data: dispute } = await supabase.from('disputes').select('p1_evidence,p2_evidence').eq('match_id', match.id).single()
      if (dispute) { match.p1_evidence = dispute.p1_evidence; match.p2_evidence = dispute.p2_evidence }
    }

    // Load archive
    const { data: archived } = await supabase
      .from('matches')
      .select(`*, player_one:player_one_id(username), player_two:player_two_id(username)`)
      .or(`player_one_id.eq.${player.id},player_two_id.eq.${player.id}`)
      .eq('season', SEASON).in('status', ['completed','disputed'])
      .order('created_at', { ascending: false }).limit(10)
    archivedMatches = archived || []

    await render()
  }

  init()
</script>
</body>
</html>
